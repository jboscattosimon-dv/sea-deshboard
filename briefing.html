<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Briefing de Cliente</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#F7F5F0;min-height:100vh;color:#1a1a1a}
  .top{background:#081542;height:6px}
  .wrap{max-width:680px;margin:0 auto;padding:32px 20px 60px}
  .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:32px}
  .logo-row img{height:36px}
  .card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px}
  h1{font-size:22px;font-weight:700;color:#081542;margin-bottom:6px}
  .subtitle{font-size:14px;color:#666;margin-bottom:28px}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#999;margin:24px 0 14px;border-top:1px solid #f0f0f0;padding-top:20px}
  .section-title:first-of-type{margin-top:0;border-top:none;padding-top:0}
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
  input,textarea,select{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fff;transition:border-color .15s;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#081542}
  textarea{min-height:80px}
  .form-group{margin-bottom:18px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:520px){.row{grid-template-columns:1fr}}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;background:#081542;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;width:100%}
  .btn:hover{background:#0a1d5c}
  .btn:disabled{background:#ccc;cursor:not-allowed}
  .success{text-align:center;padding:48px 20px}
  .success svg{margin-bottom:16px}
  .success h2{font-size:20px;font-weight:700;color:#081542;margin-bottom:8px}
  .success p{font-size:14px;color:#666}
  .loading{text-align:center;padding:60px;font-size:14px;color:#999}
  .error-msg{text-align:center;padding:60px;font-size:14px;color:#e74c3c}
  .hint{font-size:12px;color:#9ca3af;margin-top:4px}
  .required{color:#e74c3c}
</style>
</head>
<body>
<div class="top"></div>
<div class="wrap">
  <div class="logo-row">
    <img src="/logo.png" alt="SEA Agência">
    <span style="font-size:13px;font-weight:600;color:#081542;opacity:.6">Briefing de Cliente</span>
  </div>
  <div id="root"><div class="loading">Carregando...</div></div>
</div>
<script>
const clienteId = location.pathname.split('/').filter(Boolean).pop()
  || new URLSearchParams(location.search).get('cliente');

async function load() {
  const root = document.getElementById('root');
  if (!clienteId) { root.innerHTML = '<div class="error-msg">Link inválido. Solicite um novo link à agência.</div>'; return; }

  const r = await fetch('/api/briefing/' + clienteId);
  if (!r.ok) { root.innerHTML = '<div class="error-msg">Cliente não encontrado. Solicite um novo link.</div>'; return; }
  const { cliente, briefing } = await r.json();

  const v = briefing || {};
  root.innerHTML = `
    <div class="card">
      <h1>Olá, ${cliente.nome}!</h1>
      <p class="subtitle">Preencha o briefing abaixo para que nossa equipe possa desenvolver o melhor trabalho para você. Leva menos de 5 minutos.</p>

      <div class="section-title">Informações da empresa</div>
      <div class="form-group">
        <label>Razão social / Nome da empresa <span class="required">*</span></label>
        <input id="razao_social" value="${esc(v.razao_social)}" placeholder="Ex: Empresa XYZ Ltda">
      </div>
      <div class="row">
        <div class="form-group">
          <label>Segmento / Setor</label>
          <input id="segmento" value="${esc(v.segmento)}" placeholder="Ex: Saúde, Moda, Tecnologia">
        </div>
        <div class="form-group">
          <label>Tom de comunicação</label>
          <select id="tom_comunicacao">
            <option value="">Selecione...</option>
            ${['Profissional e formal','Descontraído e próximo','Jovem e moderno','Técnico e especialista','Inspirador e motivacional'].map(t =>
              `<option value="${t}" ${v.tom_comunicacao===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="section-title">Objetivos e público</div>
      <div class="form-group">
        <label>Objetivos com as redes sociais / marketing</label>
        <textarea id="objetivos" placeholder="Ex: Aumentar seguidores, gerar vendas, fortalecer marca...">${esc(v.objetivos)}</textarea>
      </div>
      <div class="form-group">
        <label>Público-alvo</label>
        <textarea id="publico_alvo" placeholder="Descreva o perfil do seu cliente ideal: idade, gênero, interesses, localização...">${esc(v.publico_alvo)}</textarea>
      </div>

      <div class="section-title">Identidade visual e referências</div>
      <div class="form-group">
        <label>Cores preferidas / cores da marca</label>
        <input id="cores_preferidas" value="${esc(v.cores_preferidas)}" placeholder="Ex: Azul marinho, dourado e branco">
      </div>
      <div class="form-group">
        <label>Concorrentes (para não usar estilos similares)</label>
        <input id="concorrentes" value="${esc(v.concorrentes)}" placeholder="Ex: Empresa A, Empresa B">
      </div>
      <div class="form-group">
        <label>Links de referência (perfis, sites que admira)</label>
        <textarea id="links_referencia" placeholder="Cole aqui links de perfis ou sites que gosta...">${esc(v.links_referencia)}</textarea>
        <div class="hint">Instagram, Pinterest, sites — qualquer coisa que inspire o estilo desejado</div>
      </div>

      <div class="section-title">Observações finais</div>
      <div class="form-group">
        <label>Informações adicionais / contexto importante</label>
        <textarea id="observacoes" placeholder="Algo importante que devemos saber...">${esc(v.observacoes)}</textarea>
      </div>

      <button class="btn" id="submitBtn" onclick="submit()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
        Enviar briefing
      </button>
      ${briefing ? `<p style="text-align:center;font-size:12px;color:#9ca3af;margin-top:12px">Último envio: ${new Date(briefing.preenchido_em).toLocaleDateString('pt-BR')}</p>` : ''}
    </div>`;
}

function esc(v) { return (v||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function submit() {
  const btn = document.getElementById('submitBtn');
  const razao_social = document.getElementById('razao_social').value.trim();
  if (!razao_social) { alert('Informe a razão social.'); return; }

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const body = {
    razao_social,
    segmento: document.getElementById('segmento').value.trim(),
    objetivos: document.getElementById('objetivos').value.trim(),
    publico_alvo: document.getElementById('publico_alvo').value.trim(),
    cores_preferidas: document.getElementById('cores_preferidas').value.trim(),
    concorrentes: document.getElementById('concorrentes').value.trim(),
    tom_comunicacao: document.getElementById('tom_comunicacao').value,
    links_referencia: document.getElementById('links_referencia').value.trim(),
    observacoes: document.getElementById('observacoes').value.trim()
  };

  const r = await fetch('/api/briefing/' + clienteId, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });

  if (r.ok) {
    document.getElementById('root').innerHTML = `
      <div class="card success">
        <svg width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="#27AE60" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
        <h2>Briefing enviado!</h2>
        <p>Recebemos suas informações. Nossa equipe usará esses dados para criar conteúdos alinhados ao seu negócio.</p>
        <p style="margin-top:12px;font-size:13px;color:#9ca3af">Você pode fechar esta página.</p>
      </div>`;
  } else {
    btn.disabled = false;
    btn.innerHTML = 'Tentar novamente';
    alert('Erro ao enviar. Tente novamente.');
  }
}

load();
</script>
</body>
</html>
