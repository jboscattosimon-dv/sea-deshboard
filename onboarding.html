<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEA — Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #F7F5F0; color: #18170F; font-family: 'Instrument Sans', sans-serif; min-height: 100vh; }

.top-bar {
  background: #18170F;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky; top: 0; z-index: 10;
}
.top-bar img { height: 28px; filter: brightness(0) invert(1); }
.top-bar .client-label { color: rgba(255,255,255,0.55); font-size: 13px; }
.top-bar .client-name { color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }

.container { max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; }

.progress-wrap { background: #fff; border: 1px solid #E8E4DC; border-radius: 12px; padding: 18px 20px; margin-bottom: 24px; }
.progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-label span { font-size: 13px; font-weight: 600; }
.progress-label .pct { font-size: 12px; color: #8C8878; }
.progress-bar { height: 8px; background: #F0EDE6; border-radius: 100px; overflow: hidden; }
.progress-fill { height: 100%; background: #27AE60; border-radius: 100px; transition: width 0.4s ease; }

.categoria-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #8C8878;
  margin: 28px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #E8E4DC;
}

.item-card {
  background: #fff;
  border: 1.5px solid #E8E4DC;
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.item-card.done { border-color: #27AE60; }
.item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.item-label { font-size: 14px; font-weight: 600; flex: 1; }
.item-label .req { color: #E74C3C; margin-left: 3px; font-size: 11px; }
.badge { padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.badge-pendente { background: #F3F4F6; color: #6B7280; }
.badge-enviado { background: #D1FAE5; color: #065F46; }
.item-desc { font-size: 12px; color: #8C8878; margin-bottom: 12px; line-height: 1.5; }

textarea, input[type=text], input[type=url] {
  width: 100%; padding: 10px 14px; border: 1.5px solid #E8E4DC; border-radius: 8px;
  font-family: 'Instrument Sans', sans-serif; font-size: 13px; color: #18170F;
  background: #F7F5F0; outline: none; transition: border-color 0.15s; resize: vertical;
}
textarea:focus, input:focus { border-color: #18170F; background: #fff; }
textarea { min-height: 80px; }

.upload-zone {
  border: 2px dashed #E8E4DC; border-radius: 8px; padding: 20px;
  text-align: center; cursor: pointer; transition: all 0.15s; background: #F7F5F0;
}
.upload-zone:hover, .upload-zone.drag { border-color: #18170F; background: #fff; }
.upload-zone input { display: none; }
.upload-zone .icon { font-size: 24px; margin-bottom: 6px; }
.upload-zone .hint { font-size: 12px; color: #8C8878; }
.upload-zone .fname { font-size: 12px; font-weight: 600; color: #18170F; margin-top: 6px; }

.checkbox-wrap { display: flex; align-items: center; gap: 10px; padding: 10px 0; cursor: pointer; }
.checkbox-wrap input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #27AE60; }
.checkbox-wrap span { font-size: 13px; font-weight: 500; }

.preview-sent { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
.preview-sent a { color: #065F46; font-weight: 600; text-decoration: none; }
.preview-sent a:hover { text-decoration: underline; }

.btn-save {
  margin-top: 12px; width: 100%; padding: 11px;
  background: #18170F; color: #fff; border: none; border-radius: 8px;
  font-family: 'Instrument Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.85; }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-save.loading::after { content: ' ...'; }

.success-banner {
  background: #D1FAE5; border: 1.5px solid #6EE7B7; border-radius: 12px;
  padding: 24px; text-align: center; margin-top: 32px;
}
.success-banner h2 { font-family: 'Syne', sans-serif; font-size: 20px; color: #065F46; margin-bottom: 8px; }
.success-banner p { font-size: 13px; color: #047857; }

#loadingScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 14px; color: #8C8878; }
#errorScreen { display: none; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.error-box { max-width: 400px; text-align: center; }
.error-box h2 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 8px; }
.error-box p { font-size: 13px; color: #8C8878; }

@media (max-width: 480px) {
  .container { padding: 16px 14px 48px; }
  .item-card { padding: 14px 14px; }
}
</style>
</head>
<body>

<div id="loadingScreen">Carregando formulário...</div>
<div id="errorScreen">
  <div class="error-box">
    <h2>Link inválido</h2>
    <p>Este formulário não existe ou o link expirou. Entre em contato com a agência.</p>
  </div>
</div>

<div id="mainApp" style="display:none">
  <div class="top-bar">
    <img src="/logo.png" alt="SEA">
    <div>
      <div class="client-label">Onboarding</div>
      <div class="client-name" id="clientName"></div>
    </div>
  </div>
  <div class="container">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">0 de 0 itens respondidos</span>
        <span class="pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div id="formContent"></div>
    <div id="successBanner" class="success-banner" style="display:none">
      <h2>✓ Tudo enviado!</h2>
      <p>Todos os itens obrigatórios foram preenchidos. A equipe da SEA irá revisar e entrar em contato em breve.</p>
    </div>
  </div>
</div>

<script>
const token = window.location.pathname.split('/').filter(Boolean).pop();
let formData = null;
let respostas = {}; // itemId -> { respondido: bool }

async function init() {
  try {
    const r = await fetch(`/api/onboarding/form/${token}`);
    if (!r.ok) throw new Error('not found');
    formData = await r.json();
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = '';
    document.getElementById('clientName').textContent = formData.cliente_nome;
    renderForm();
  } catch(e) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display = 'flex';
  }
}

function renderForm() {
  const grouped = {};
  (formData.itens || []).forEach(i => {
    if (!grouped[i.categoria]) grouped[i.categoria] = [];
    grouped[i.categoria].push(i);
    if (i.resposta) respostas[i.id] = { respondido: true };
  });

  const html = Object.entries(grouped).map(([cat, itens]) => `
    <div class="categoria-title">${cat}</div>
    ${itens.map(i => renderItem(i)).join('')}
  `).join('');

  document.getElementById('formContent').innerHTML = html;
  updateProgress();

  // Bind drag-and-drop for upload zones
  document.querySelectorAll('.upload-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag');
      const f = e.dataTransfer.files[0];
      if (f) handleFileSelected(zone.dataset.itemId, f);
    });
  });
}

function renderItem(item) {
  const done = !!respostas[item.id];
  const r = item.resposta;
  const badgeHtml = done
    ? '<span class="badge badge-enviado">Enviado ✓</span>'
    : '<span class="badge badge-pendente">Pendente</span>';

  let inputHtml = '';

  if (item.tipo === 'upload') {
    const previewHtml = r?.arquivo_url ? `<div class="preview-sent">
      <span>📎</span>
      <a href="${r.arquivo_url}" target="_blank">${r.arquivo_nome || 'Arquivo enviado'}</a>
      <span style="color:#047857;margin-left:auto">✓</span>
    </div>` : '';
    inputHtml = `
      ${previewHtml}
      <div class="upload-zone" id="zone-${item.id}" data-item-id="${item.id}" onclick="document.getElementById('file-${item.id}').click()">
        <div class="icon">📎</div>
        <div class="hint">Clique ou arraste o arquivo aqui</div>
        <div class="hint">PDF, imagem, vídeo — máx. 20MB</div>
        <div class="fname" id="fname-${item.id}"></div>
        <input type="file" id="file-${item.id}" onchange="handleFileInput('${item.id}', this)">
      </div>
    `;
  } else if (item.tipo === 'texto') {
    inputHtml = `<textarea id="inp-${item.id}" placeholder="Digite sua resposta...">${r?.valor_texto || ''}</textarea>`;
  } else if (item.tipo === 'link') {
    inputHtml = `<input type="url" id="inp-${item.id}" placeholder="https://..." value="${r?.valor_texto || ''}">`;
  } else if (item.tipo === 'checkbox') {
    const checked = r?.valor_checkbox ? 'checked' : '';
    inputHtml = `<label class="checkbox-wrap">
      <input type="checkbox" id="inp-${item.id}" ${checked}>
      <span>Confirmo que realizei esta etapa</span>
    </label>`;
  }

  return `<div class="item-card${done ? ' done' : ''}" id="card-${item.id}">
    <div class="item-header">
      <div class="item-label">${item.label}${item.obrigatorio ? '<span class="req">*</span>' : ''}</div>
      ${badgeHtml}
    </div>
    ${item.descricao ? `<div class="item-desc">${item.descricao}</div>` : ''}
    ${inputHtml}
    <button class="btn-save" id="btn-${item.id}" onclick="salvarItem('${item.id}', '${item.tipo}')">Salvar</button>
  </div>`;
}

function handleFileInput(itemId, input) {
  const f = input.files[0];
  if (f) handleFileSelected(itemId, f);
}

function handleFileSelected(itemId, file) {
  if (file.size > 20 * 1024 * 1024) { alert('Arquivo muito grande. Máximo 20MB.'); return; }
  const fnameEl = document.getElementById('fname-' + itemId);
  if (fnameEl) fnameEl.textContent = file.name;
  // Store file reference for later save
  const input = document.getElementById('file-' + itemId);
  if (input) {
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
  }
}

async function salvarItem(itemId, tipo) {
  const btn = document.getElementById('btn-' + itemId);
  btn.disabled = true; btn.classList.add('loading');

  try {
    let body = { tipo_resposta: tipo };

    if (tipo === 'upload') {
      const input = document.getElementById('file-' + itemId);
      const file = input?.files?.[0];
      if (!file) { alert('Selecione um arquivo.'); btn.disabled = false; btn.classList.remove('loading'); return; }
      const b64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
      body = { tipo_resposta: 'arquivo', nome: file.name, tipo: file.type, data: b64 };
    } else if (tipo === 'checkbox') {
      body.valor_checkbox = document.getElementById('inp-' + itemId)?.checked ?? false;
    } else {
      const val = document.getElementById('inp-' + itemId)?.value?.trim();
      if (!val) { alert('Preencha o campo antes de salvar.'); btn.disabled = false; btn.classList.remove('loading'); return; }
      body.valor_texto = val;
    }

    const r = await fetch(`/api/onboarding/form/${token}/resposta/${itemId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json(); alert('Erro: ' + (e.erro || 'Tente novamente.')); return; }

    respostas[itemId] = { respondido: true };
    const card = document.getElementById('card-' + itemId);
    if (card) {
      card.classList.add('done');
      const badge = card.querySelector('.badge');
      if (badge) { badge.className = 'badge badge-enviado'; badge.textContent = 'Enviado ✓'; }
    }
    updateProgress();
  } catch(e) {
    alert('Erro inesperado. Tente novamente.');
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
  }
}

function updateProgress() {
  if (!formData) return;
  const total = formData.itens.length;
  const done = Object.keys(respostas).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressText').textContent = `${done} de ${total} iten${total !== 1 ? 's' : ''} respondido${total !== 1 ? 's' : ''}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const obrigatorios = formData.itens.filter(i => i.obrigatorio);
  const obrigDone = obrigatorios.every(i => !!respostas[i.id]);
  if (obrigDone && obrigatorios.length > 0) {
    document.getElementById('successBanner').style.display = '';
  }
}

init();
</script>
</body>
</html>
